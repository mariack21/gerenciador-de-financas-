<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Financeira 50/30/20</title>
    <style>
        /* Reset básico e fontes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* Container Principal (Card) */
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 1.5rem;
            text-align: center;
        }

        /* Formulário */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #3498db;
        }

        /* Botão */
        button {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #27ae60;
        }

        /* Resultados */
        .resultado {
            margin-top: 25px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .item-resultado {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 1rem;
        }

        .item-resultado span:first-child {
            font-weight: 500;
            color: #666;
        }

        .item-resultado span:last-child {
            font-weight: bold;
            color: #2c3e50;
        }

        /* Cores específicas para cada categoria */
        .despesas { color: #e74c3c !important; }
        .desejos { color: #f39c12 !important; }
        .investimentos { color: #2980b9 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Regra Financeira 50/30/20</h2>
    
    <div class="form-group">
        <label for="valor">Valor Total (R$)</label> 
        <input type="number" id="valor" placeholder="Ex: 3000">
    </div>

    <button onclick="calcular()">Calcular</button>

    <div id="saida" class="resultado"></div>
</div>

<script>
    function calcular() {
        const valorInput = document.getElementById('valor').value;
        
        // Validação simples para não calcular campo vazio
        if (!valorInput) {
            alert("Por favor, insira um valor.");
            return;
        }

        const valor = parseFloat(valorInput);
        const despesas = valor * 0.5;
        const desejos = valor * 0.3;
        const investimentos = valor * 0.2;

        // Formatação para moeda local (R$)
        const formatar = (val) => val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        document.getElementById('saida').innerHTML = `
            <div class="item-resultado">
                <span>Necessidades (50%):</span>
                <span class="despesas">${formatar(despesas)}</span>
            </div>
            <div class="item-resultado">
                <span>Desejos (30%):</span>
                <span class="desejos">${formatar(desejos)}</span>
            </div>
            <div class="item-resultado">
                <span>Investimentos (20%):</span>
                <span class="investimentos">${formatar(investimentos)}</span>
            </div>
        `;
    }
</script>

</body>
</html>
